<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anakke Suprii</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">

    <style>
        /* CSS Utama & UI Modern Cyberpunk-Glassmorphism */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at center, #1a1c29, #0e1017);
            color: #f3f4f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 1. LOADING SCREEN - Premium Cyberpunk Style */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #090a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .hacker-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px 40px;
            border-radius: 24px;
            border: 1px solid rgba(0, 255, 163, 0.2);
            box-shadow: 0 0 40px rgba(0, 255, 163, 0.05);
            text-align: center;
            max-width: 90%;
            width: 450px;
        }

        .hacker-text {
            color: #00ffa3;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            min-height: 4.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 15px rgba(0, 255, 163, 0.4);
            line-height: 1.4;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-top: 25px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ffa3, #00b8ff);
            box-shadow: 0 0 10px #00ffa3;
            transition: width 0.4s ease;
        }

        /* 2. MAIN CARD GAME SCREEN */
        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #game-screen.show {
            display: flex;
            transform: scale(1);
            opacity: 1;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 25px;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            width: 100%;
            perspective: 1000px;
        }

        .card {
            width: 100%;
            aspect-ratio: 1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-front {
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            font-size: 2rem;
            font-weight: 700;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .card-back {
            background-color: #1e1b4b;
            transform: rotateY(180deg);
            background-size: cover;
            background-position: center;
            border: 2px solid #00ffa3;
            box-shadow: 0 0 15px rgba(0, 255, 163, 0.2);
        }

        /* 3. VIDEO SUCCESS SCREEN */
        #video-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 700px;
            padding: 20px;
            animation: zoomIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            /* 16:9 Aspect Ratio */
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            background: #000;
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Responsive Mobile Layout */
        @media (max-width: 500px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .hacker-box {
                padding: 20px;
            }

            .hacker-text {
                font-size: 1.1rem;
            }

            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>

    <audio id="meme-sound" src="assets/music1.mp3" preload="auto"></audio>

    <div id="loading-screen">
        <div class="hacker-box">
            <div id="hacker-text" class="hacker-text">Sek sabar tunggu pri...</div>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <h1>Jodohne Foto Gantengmu Kene pri! 🕵️‍♂️</h1>
        <div class="grid">
        </div>
    </div>

    <div id="video-screen">
        <h1 style="color: #00ffa3; margin-bottom: 15px;">WKWK SELAMAT Supri menang 🎉</h1>
        <div class="video-container">
            <video id="prank-video" src="assets/vidio.mp4" controls></video>
        </div>
    </div>

    <script>
        // --- 1. SETTING LOADING SCREEN (Bahasa Jawa) ---
        const prankTexts = [
            "Sabar Supri loading...",
            "Golek i foto ganteng mu sek pri...",
            "Okey ayo gass! 🚀"
        ];

        let textIndex = 0;
        const textElement = document.getElementById('hacker-text');
        const progressBar = document.getElementById('progress-bar');
        const loadingScreen = document.getElementById('loading-screen');
        const gameScreen = document.getElementById('game-screen');
        const videoScreen = document.getElementById('video-screen');
        const prankVideo = document.getElementById('prank-video');

        // Mengatur pergerakan Progress Bar & Teks secara presisi
        const totalSteps = prankTexts.length;
        const intervalTime = 2500; // waktu per teks (2.5 detik)

        const prankInterval = setInterval(() => {
            textIndex++;
            let progressPercentage = (textIndex / totalSteps) * 100;
            progressBar.style.width = `${progressPercentage}%`;

            if (textIndex < totalSteps) {
                textElement.innerText = prankTexts[textIndex];
            } else {
                clearInterval(prankInterval);
                // Transisi Loading Selesai ke Game Screen
                setTimeout(() => {
                    loadingScreen.style.opacity = '0';
                    loadingScreen.style.transform = 'translateY(-50px)';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        gameScreen.style.display = 'flex';
                        setTimeout(() => gameScreen.classList.add('show'), 50);
                        initGame();
                    }, 600);
                }, 500);
            }
        }, intervalTime);


        // --- 2. GAME LOGIC ---
        const grid = document.querySelector('.grid');
        const memeAudio = document.getElementById('meme-sound');

        // 6 File foto aib/ganteng temanmu
        const friendImages = [
            'assets/foto1.jpg', 'assets/foto2.jpg', 'assets/foto3.jpg',
            'assets/foto4.jpg', 'assets/foto5.jpg', 'assets/foto6.jpg'
        ];

        let cardsArray = [...friendImages, ...friendImages];
        let firstCard = null, secondCard = null;
        let lockBoard = false;
        let matchedPairs = 0;

        function initGame() {
            cardsArray.sort(() => 0.5 - Math.random());

            cardsArray.forEach((imageSrc) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.name = imageSrc;

                card.innerHTML = `
                    <div class="card-front">?</div>
                    <div class="card-back" style="background-image: url('${imageSrc}');"></div>
                `;

                card.addEventListener('click', flipCard);
                grid.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            if (!firstCard) {
                firstCard = this;
                return;
            }

            secondCard = this;
            checkMatch();
        }

        function checkMatch() {
            let isMatch = firstCard.dataset.name === secondCard.dataset.name;

            if (isMatch) {
                disableCards();
                playMemeSound();
                matchedPairs++;

                // JIKA SEMUA KARTU SUDAH BENAR
                if (matchedPairs === friendImages.length) {
                    setTimeout(() => {
                        transitionToVideo();
                    }, 1500); // Tunggu 1.5 detik setelah kartu terakhir terbuka
                }
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            firstCard = null;
            secondCard = null;
            lockBoard = false;
        }

        function playMemeSound() {
            memeAudio.currentTime = 0;
            memeAudio.play().catch(e => console.log("Audio diblokir browser"));
            setTimeout(() => { memeAudio.pause(); }, 1500); // Lagu meme berputar 3 detik
        }

        // --- 3. TRANSISI KE PEMUTAR VIDEO ---
        function transitionToVideo() {
            // Hilangkan game screen dengan animasi smooth
            gameScreen.style.opacity = '0';
            gameScreen.style.transform = 'scale(0.9)';

            setTimeout(() => {
                gameScreen.style.display = 'none';
                videoScreen.style.display = 'flex';

                // Putar video otomatis + bunyikan suara video
                prankVideo.muted = false;
                prankVideo.play().catch(e => {
                    console.log("Video autoplay diblokir browser, pengguna harus klik play sendiri.");
                });
            }, 600);
        }
    </script>
</body>

</html>
